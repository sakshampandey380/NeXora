<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css_1login.css">
</head>

<body>
    <div class="container">
        <!-- Background Elements -->
        <div class="tree tree-1">
            <div class="trunk"></div>
            <div class="leaves"></div>
        </div>
        <div class="tree tree-2">
            <div class="trunk"></div>
            <div class="leaves"></div>
        </div>
        <div class="tree tree-3">
            <div class="trunk"></div>
            <div class="leaves"></div>
        </div>
        <div class="tree tree-4">
            <div class="trunk"></div>
            <div class="leaves"></div>
        </div>

        <div class="path"></div>

        <div class="chair chair-1">
            <div class="chair-back"></div>
            <div class="chair-base"></div>
        </div>
        <div class="chair chair-2">
            <div class="chair-back"></div>
            <div class="chair-base"></div>
        </div>

        <div class="falling-leaves" id="leaves-container"></div>

        <!-- Login Form -->
        <div class="login-form">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                    <i class="fas fa-user"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <div class="form-footer">
                    <p>Don't have an account? <a href="#">Sign Up</a></p>
                    <p><a href="#">Forgot Password?</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="script_1login.js"></script>
</body>

</html>
